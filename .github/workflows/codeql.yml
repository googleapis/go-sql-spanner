name: "CodeQL Analysis"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '30 18 * * 4'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: autobuild
          - language: go
            build-mode: autobuild
          - language: python
            build-mode: autobuild
          - language: ruby
            build-mode: autobuild
          - language: java
            build-mode: manual
          - language: csharp
            build-mode: manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    # Set up Go (needed for Go analysis and C# wrapper compilation)
    - name: Set up Go
      if: matrix.language == 'go' || matrix.language == 'csharp'
      uses: actions/setup-go@v6
      with:
        go-version: 1.26.x

    # Set up Java JDK for Java build
    - name: Set up JDK 17
      if: matrix.language == 'java'
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    # Set up .NET for C# build
    - name: Set up .NET
      if: matrix.language == 'csharp'
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'

    # Initialize the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}

    # Perform autobuild for non-manual languages
    - name: Autobuild
      if: matrix.build-mode == 'autobuild'
      uses: github/codeql-action/autobuild@v4

    # Custom build steps for Java (manual)
    - name: Build Java wrapper
      if: matrix.language == 'java'
      run: |
        mvn -f spannerlib/wrappers/spannerlib-java/pom.xml compile -DskipTests

    # Custom build steps for C# (manual)
    - name: Build C# wrapper dependencies and library
      if: matrix.language == 'csharp'
      run: |
        cd spannerlib/wrappers/spannerlib-dotnet
        chmod +x build.sh build-grpc-server.sh build-shared-lib.sh
        ./build.sh
        dotnet build spannerlib-dotnet.sln --configuration Release

    # Perform CodeQL Analysis
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4

      with:
        category: "/language:${{matrix.language}}"
