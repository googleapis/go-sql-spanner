name: Build Shared SpannerLib

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        go-version: ['1.25.x']
        # Consolidated matrix: Linux handles Linux+Windows; macOS handles macOS
        os: [ubuntu-latest, macos-latest]
      
    # Use a container for the Linux build to ensure older glibc compatibility
    container: ${{ matrix.os == 'ubuntu-latest' && 'ubuntu:20.04' || '' }}

    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Install Cross-Compilers (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        # Install ARM64 cross-compiler and MinGW for Windows cross-compilation
        apt-get install -y git build-essential gcc-aarch64-linux-gnu gcc-mingw-w64 curl

    - name: Build Binaries
      shell: bash
      run: |
        # Mark the directory as safe for git inside container
        git config --global --add safe.directory "$GITHUB_WORKSPACE"

        cd spannerlib/shared
        
        # Configure Environment based on OS
        if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
          echo "Configuring for Linux & Windows build..."
          
          # Enable Linux ARM64
          export BUILD_LINUX_ARM64=true
          export CC_LINUX_ARM64=aarch64-linux-gnu-gcc
          
          # Enable Windows Build (MinGW)
          # The script automatically detects x86_64-w64-mingw32-gcc if SKIP_WINDOWS is not set
          export SKIP_WINDOWS=false 
          
          # Skip macOS (Can't easily build Mac on Linux)
          export SKIP_MACOS=true

        elif [ "${{ matrix.os }}" == "macos-latest" ]; then
          echo "Configuring for macOS build..."
          export SKIP_LINUX=true
          export SKIP_WINDOWS=true
          export BUILD_MACOS_AMD64=true
        fi

        # Run the build script
        ./build-binaries.sh

    - name: Upload Artifacts
      uses: actions/upload-artifact@v6
      with:
        name: spannerlib-binaries-${{ matrix.os }}
        path: spannerlib/shared/binaries/
